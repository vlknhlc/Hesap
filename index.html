<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bütçe Takip Pro</title>
    <style>
        :root { --p: #1a2a6c; --s: #27ae60; --d: #e74c3c; --b: #f4f7f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; font-size: 14px; }
        body { background: var(--b); }
        
        /* GİRİŞ EKRANI */
        #login-screen { position: fixed; inset: 0; background: var(--p); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-main { background: #007bff; color: white; margin-top: 10px; }
        .link { display: inline-block; margin-top: 15px; color: #666; text-decoration: underline; cursor: pointer; font-size: 12px; }

        /* ANA UYGULAMA */
        #app-content { display: none; max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; }
        .nav { background: var(--p); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        select { padding: 5px; border-radius: 5px; font-weight: bold; }
        
        /* EXCEL TABLO */
        .table { width: 100%; border-collapse: collapse; }
        .row { display: grid; border-bottom: 1px solid #eee; align-items: center; }
        .g-row { grid-template-columns: 1fr 80px 45px 35px 35px; }
        .gel-row { grid-template-columns: 1fr 100px 35px; }
        .cell { padding: 5px; border-right: 1px solid #f0f0f0; display: flex; align-items: center; }
        .head { background: #f8f9fa; font-weight: bold; font-size: 11px; text-align: center; color: #777; }
        .table input { border: none; padding: 5px; background: transparent; margin: 0; }
        .table input:focus { background: #fffde7; }
        
        .title { background: #f1f1f1; padding: 8px; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; }
        .sum { padding: 15px; border-top: 2px solid #ddd; }
        .sum div { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f9f9f9; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="login-screen">
    <div class="card">
        <h2 id="auth-title">Cebimdeki Bütçe</h2>
        <input type="text" id="email" placeholder="E-posta Adresi">
        <input type="password" id="pass" placeholder="Şifre">
        <button class="btn btn-main" onclick="handleAuth()" id="auth-btn">GİRİŞ YAP</button>
        <div class="link" onclick="toggleMode()" id="mode-link">Hesap Oluştur</div><br>
        <div class="link" onclick="forgotPass()" style="color:#999; text-decoration:none;">Şifremi Unuttum</div>
    </div>
</div>

<div id="app-content">
    <div class="nav">
        <span id="u-mail" style="font-size:10px; opacity:0.7;">...</span>
        <div>
            <select id="y-sel" onchange="load()"></select>
            <select id="m-sel" onchange="load()"></select>
        </div>
        <button onclick="location.reload()" style="background:var(--d); color:white; border:none; padding:4px 8px; border-radius:4px;">Çıkış</button>
    </div>

    <div class="title" style="color:var(--d)">GİDERLER (NAKİT)</div>
    <div class="row g-row head"><div>AÇIKLAMA</div><div>TUTAR</div><div>GÜN</div><div>OK</div><div></div></div>
    <div id="g-list"></div>
    <button class="btn" style="color:#007bff; background:none;" onclick="add('gider')">+ Yeni Gider Ekle</button>

    <div class="title" style="color:var(--s); margin-top:10px;">GELİRLER</div>
    <div class="row gel-row head"><div>GELİR KAYNAĞI</div><div>TUTAR</div><div></div></div>
    <div id="gel-list"></div>
    <button class="btn" style="color:#27ae60; background:none;" onclick="add('gelir')">+ Yeni Gelir Ekle</button>

    <div class="sum">
        <div><span>Toplam Gider:</span> <span id="s-g">0 TL</span></div>
        <div><span>Toplam Gelir:</span> <span id="s-gel">0 TL</span></div>
        <div style="font-weight:bold; color:var(--d); font-size:16px; margin-top:10px; border:none;">
            <span>ÖDENECEK:</span> <span id="s-k">0 TL</span>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB2AtnX-D7Wv1_ONCc3nhOrQgAK4RWWPiE",
        authDomain: "butcetakip-1addc.firebaseapp.com",
        projectId: "butcetakip-1addc",
        storageBucket: "butcetakip-1addc.firebasestorage.app",
        messagingSenderId: "657917369506",
        appId: "1:657917369506:web:8b3e9224f5ccd817eccbfb"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let isLogin = true;
    let userDoc = "";

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "Cebimdeki Bütçe" : "Yeni Kayıt";
        document.getElementById('auth-btn').innerText = isLogin ? "GİRİŞ YAP" : "KAYIT OL";
        document.getElementById('mode-link').innerText = isLogin ? "Hesap Oluştur" : "Zaten Hesabım Var";
    }

    function handleAuth() {
        const mail = document.getElementById('email').value.trim().toLowerCase();
        const pass = document.getElementById('pass').value;
        if(!mail || !pass) return alert("Boş alan bırakmayın!");
        const id = mail.replace(/\./g, "_");

        if(isLogin) {
            db.collection("sistem_kullanicilari").doc(id).get().then(doc => {
                if(doc.exists && doc.data().password === pass) {
                    userDoc = id;
                    document.getElementById('u-mail').innerText = mail;
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app-content').style.display = 'block';
                    load(true);
                } else { alert("Giriş başarısız! Bilgileri kontrol edin."); }
            }).catch(e => alert("Hata: " + e));
        } else {
            db.collection("sistem_kullanicilari").doc(id).set({password: pass, email: mail})
            .then(() => { alert("Kaydedildi! Şimdi giriş yapın."); toggleMode(); });
        }
    }

    function forgotPass() {
        const mail = document.getElementById('email').value.trim().toLowerCase();
        if(!mail) return alert("E-posta yazın!");
        db.collection("sistem_kullanicilari").doc(mail.replace(/\./g, "_")).get().then(doc => {
            if(doc.exists) alert("Şifreniz: " + doc.data().password);
            else alert("Kullanıcı bulunamadı!");
        });
    }

    window.onload = function() {
        const m = document.getElementById('m-sel'), y = document.getElementById('y-sel');
        ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"].forEach((n,i)=>m.add(new Option(n,i)));
        for(let i=2025;i<=2030;i++) y.add(new Option(i,i));
        m.value = new Date().getMonth(); y.value = new Date().getFullYear();
    };

    function save() {
        if(!userDoc) return;
        const donem = document.getElementById('y-sel').value + "_" + document.getElementById('m-sel').value;
        const g = [], gel = [];
        document.querySelectorAll('#g-list .item').forEach(r => {
            g.push({ad: r.querySelector('.i-ad').value, tu: r.querySelector('.i-tu').value, gu: r.querySelector('.i-gu').value, od: r.querySelector('.i-od').checked});
        });
        document.querySelectorAll('#gel-list .item').forEach(r => {
            gel.push({ad: r.querySelector('.i-ad').value, tu: r.querySelector('.i-tu').value});
        });
