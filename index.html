<script>
    // Supabase Bağlantı Parametreleri
    const SUPABASE_URL = "https://itmjtoevsxvpzphnxauc.supabase.co"; 
    const SUPABASE_ANON_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0bWp0b2V2c3h2cHpwaG54YXVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0OTA1NDYsImV4cCI6MjA5ODA2NjU0Nn0.MBvdsBKeQgoNZbAf5hFaJ957EN_nb-Zj3D17ySSdLkw"; 
    
    // Uygulama genelinde SADECE TEK BİR supabase istemcisi tanımlanıyor
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Sayfa Yüklendiğinde Oturum Kontrolü
    window.onload = function() {
        const kayitliKullanici = localStorage.getItem("aktif_kullanici");
        if (kayitliKullanici) {
            paneliGoster(kayitliKullanici);
        }
        const bugun = new Date();
        document.getElementById('ayYil').value = bugun.toISOString().slice(0, 7);
    };

    // Kullanıcı Giriş Fonksiyonu
    async function kullaniciGiris() {
        const uName = document.getElementById("loginUsername").value.trim();
        const uPass = document.getElementById("loginPassword").value.trim();

        if (!uName || !uPass) {
            alert("Lütfen alanları doldurun!");
            return;
        }

        try {
            const { data, error } = await supabase
                .from('sistem_kullanicilari')
                .select('*')
                .eq('username', uName);

            if (error) {
                console.error("Bağlantı Hatası:", error);
                alert("Veritabanı Hatası: " + error.message);
                return;
            }

            if (!data || data.length === 0) {
                alert("Kullanıcı adı bulunamadı!");
                return;
            }

            const kullanici = data[0];

            if (kullanici.password === uPass) {
                localStorage.setItem("aktif_kullanici", kullanici.username);
                paneliGoster(kullanici.username);
            } else {
                alert("Hatalı şifre!");
            }
        } catch (err) {
            console.error("Hata:", err);
            alert("Sistemde beklenmeyen bir arıza oluştu.");
        }
    }

    function paneliGoster(username) {
        document.getElementById("loginSection").classList.add("hidden");
        document.getElementById("appSection").classList.remove("hidden");
        document.getElementById("userDisplay").innerText = username;
        verileriYukle(username);
    }

    function cikisYap() {
        localStorage.removeItem("aktif_kullanici");
        document.getElementById("appSection").classList.add("hidden");
        document.getElementById("loginSection").classList.remove("hidden");
    }

    // Verileri Listeleme ve Hesaplama Fonksiyonu
    async function verileriYukle(username) {
        try {
            const { data, error } = await supabase
                .from('kullanici_verileri')
                .select('*')
                .eq('username', username)
                .order('created_at', { ascending: false });

            if (error) throw error;

            const tBody = document.getElementById("islemListesi");
            tBody.innerHTML = "";

            let tGelir = 0;
            let tGider = 0;

            data.forEach(item => {
                const miktarNum = parseFloat(item.miktar);
                if (item.veri_tipi === 'gelir') tGelir += miktarNum;
                else tGider += miktarNum;

                const tr = document.createElement("tr");
                tr.className = item.veri_tipi === 'gelir' ? 'row-gelir' : 'row-gider';
                tr.innerHTML = `
                    <td>${item.ay_yil}</td>
                    <td>${item.kategori || '-'}</td>
                    <td>${item.aciklama || '-'}</td>
                    <td>${item.veri_tipi === 'gelir' ? '+' : '-'}${miktarNum} TL</td>
                    <td><button class="sil-btn" onclick="veriSil(${item.id})">Sil</button></td>
                `;
                tBody.appendChild(tr);
            });

            document.getElementById("toplamGelir").innerText = tGelir.toFixed(2);
            document.getElementById("toplamGider").innerText = tGider.toFixed(2);
            document.getElementById("netKalan").innerText = (tGelir - tGider).toFixed(2);

        } catch (err) {
            console.error("Yükleme hatası:", err);
        }
    }

    // Yeni Veri Ekleme
    async function yeniVeriEkle() {
        const uName = localStorage.getItem("aktif_kullanici");
        const ayYil = document.getElementById("ayYil").value;
        const veriTipi = document.getElementById("veriTipi").value;
        const kategori = document.getElementById("kategori").value.trim();
        const miktar = document.getElementById("miktar").value;
        const aciklama = document.getElementById("aciklama").value.trim();

        if (!ayYil || !miktar) {
            alert("Lütfen Dönem ve Miktar alanlarını doldurun!");
            return;
        }

        try {
            const { error } = await supabase
                .from('kullanici_verileri')
                .insert([
                    {
                        username: uName,
                        ay_yil: ayYil,
                        veri_tipi: veriTipi,
                        kategori: kategori,
                        miktar: parseFloat(miktar),
                        aciklama: aciklama
                    }
                ]);

            if (error) throw error;

            document.getElementById("kategori").value = "";
            document.getElementById("miktar").value = "";
            document.getElementById("aciklama").value = "";
            
            verileriYukle(uName);
        } catch (err) {
            alert("Ekleme hatası oluştu!");
            console.error(err);
        }
    }

    // Veri Silme Fonksiyonu
    async function veriSil(id) {
        if (!confirm("Bu işlemi silmek istediğinize emin misiniz?")) return;
        const uName = localStorage.getItem("aktif_kullanici");

        try {
            const { error } = await supabase
                .from('kullanici_verileri')
                .delete()
                .eq('id', id);

            if (error) throw error;
            verileriYukle(uName);
        } catch (err) {
            console.error(err);
        }
    }
</script>
