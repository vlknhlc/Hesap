<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bütçe Pro Cloud - Gelişmiş Finans Yönetimi</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #f4f6f9; padding: 10px; color: #333; }
        
        /* Giriş ve Kayıt Paneli */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #2c3e50; display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-card {
            background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .login-card input {
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px;
        }
        
        #app-content { display: none; max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* Ay Seçici Bölümü */
        .month-selector-box {
            display: flex; gap: 10px; margin-bottom: 20px; background: #e3eaf0; padding: 12px; border-radius: 8px; align-items: center; justify-content: space-between;
        }
        .month-selector-box select { padding: 8px 12px; border-radius: 6px; border: 1px solid #bdc3c7; font-size: 16px; font-weight: bold; outline: none; cursor: pointer; }

        /* Gelişmiş Excel Stili Grid Tablo */
        .grid-table { display: grid; grid-template-columns: 2fr 1fr 0.8fr 0.6fr 0.4fr; gap: 1px; background: #e0e0e0; margin-bottom: 15px; border: 1px solid #e0e0e0; }
        .grid-header { background: #34495e; color: white; padding: 12px 8px; font-weight: bold; text-align: center; font-size: 14px; }
        .grid-cell { background: white; padding: 6px; display: flex; align-items: center; justify-content: center; }
        
        input[type="text"], input[type="number"] { width: 100%; border: 1px solid #eee; padding: 8px; border-radius: 4px; outline: none; }
        input:focus { border-color: #3498db; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        
        .btn { background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 10px; font-size: 16px; font-weight: bold; }
        .btn:hover { background: #27ae60; }
        
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .delete-btn:hover { background: #c0392b; }

        .summary-box { background: #ecf0f1; padding: 15px; border-radius: 8px; margin-bottom: 25px; }
        .summary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #bdc3c7; }
        .summary-row:last-child { border: none; }
    </style>

    <!-- FIREBASE KÜTÜPHANELERİ -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- GİRİŞ VE KAYIT EKRANI -->
<div id="login-screen">
    <div class="login-card">
        <h2 id="auth-title">Bütçe Pro Giriş</h2>
        <p id="auth-desc" style="font-size: 13px; color: #7f8c8d; margin-bottom: 10px;">Hesabınıza erişmek için E-posta girin.</p>
        
        <input type="text" id="email" placeholder="E-posta Adresiniz">
        <input type="password" id="password" placeholder="Şifreniz">
        
        <button class="btn" id="main-auth-btn" onclick="login()">Giriş Yap</button>
        <button class="btn" id="toggle-auth-btn" onclick="toggleAuthMode()" style="background: #34495e; font-size: 13px; padding: 6px;">Hesabın Yok mu? Kayıt Ol</button>
        <button onclick="forgotPassword()" style="background:none; border:none; color:#3498db; cursor:pointer; font-size:13px; margin-top:10px; text-decoration:underline;">Şifremi Unuttum</button>
        
        <p id="login-error" style="color: #e74c3c; display: none; font-size: 14px; font-weight: bold; margin-top: 10px;"></p>
    </div>
</div>

<!-- ANA UYGULAMA -->
<div id="app-content">
    
    <!-- Üst Bar ve Ay Seçici -->
    <div class="month-selector-box">
        <div>
            <label style="font-weight: bold; margin-right: 5px;">Çalışılan Dönem:</label>
            <select id="select-year" onchange="verileriBuluttanYukle()"></select>
            <select id="select-month" onchange="verileriBuluttanYukle()"></select>
        </div>
        <div>
            <span style="font-size: 13px; color: #7f8c8d;">Kullanıcı: <b id="display-user" style="color: #3498db;">-</b></span>
            <button onclick="logout()" style="background: #e74c3c; border: none; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 10px;">Çıkış</button>
        </div>
    </div>

    <!-- GİDERLER TABLOSU -->
    <h2>Giderler</h2>
    <div class="grid-table" id="giderTablosu">
        <div class="grid-header">Gider Açıklaması</div>
        <div class="grid-header">Tutar (TL)</div>
        <div class="grid-header">Son Ödeme Günü</div>
        <div class="grid-header">Ödendi</div>
        <div class="grid-header">Sil</div>
    </div>
    <button class="btn" onclick="giderSatiriEkle('', '', '', false, true)">+ Gider Ekle</button>

    <div class="summary-box">
        <div class="summary-row"><span>Seçili Ay Toplam Gider:</span> <span id="toplamGider" style="color:#3498db; font-weight:bold;">0 TL</span></div>
        <div class="summary-row"><span>Ödenen Tutar:</span> <span id="odenenGider" style="color: #2ecc71; font-weight:bold;">0 TL</span></div>
        <div class="summary-row" style="font-weight: bold;"><span>Kalan Ödeme:</span> <span id="kalanGider" style="color: #e74c3c;">0 TL</span></div>
    </div>

    <!-- GELİRLER TABLOSU -->
    <h2>Gelirler</h2>
    <div class="grid-table" style="grid-template-columns: 3fr 1fr 0.5fr;" id="gelirTablosu">
        <div class="grid-header">Gelir Açıklaması</div>
        <div class="grid-header">Tutar (TL)</div>
        <div class="grid-header">Sil</div>
    </div>
    <button class="btn" style="background: #3498db;" onclick="gelirSatiriEkle('', '', true)">+ Gelir Ekle</button>
    
    <div class="summary-box" style="background: #e8f8f5;">
        <div class="summary-row" style="font-weight: bold; border: none; color: #27ae60; font-size: 18px;">
            <span>Seçili Ay Gelir Toplamı:</span> <span id="toplamGelir">0 TL</span>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB2AtnX-D7Wv1_ONCc3nhOrQgAK4RWWPiE",
        authDomain: "butcetakip-1addc.firebaseapp.com",
        projectId: "butcetakip-1addc",
        storageBucket: "butcetakip-1addc.firebasestorage.app",
        messagingSenderId: "657917369506",
        appId: "1:657917369506:web:8b3e9224f5ccd817eccbfb"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let aktifKullaniciDoc = ""; 
    let isLoginMode = true;
    const aylar = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
    
    window.onload = function() {
        const mSelect = document.getElementById('select-month');
        const ySelect = document.getElementById('select-year');
        
        aylar.forEach((ay, index) => {
            let opt = document.createElement('option');
            opt.value = index; opt.innerText = ay; mSelect.appendChild(opt);
        });

        for(let y = 2025; y <= 2030; y++) {
            let opt = document.createElement('option');
            opt.value = y; opt.innerText = y; ySelect.appendChild(opt);
        }

        const d = new Date();
        mSelect.value = d.getMonth();
        ySelect.value = d.getFullYear();
    };

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        const title = document.getElementById('auth-title');
        const desc = document.getElementById('auth-desc');
        const mainBtn = document.getElementById('main-auth-btn');
        const toggleBtn = document.getElementById('toggle-auth-btn');
        document.getElementById('login-error').style.display = 'none';

        if(isLoginMode) {
            title.innerText = "Bütçe Pro Giriş";
            desc.innerText = "Hesabınıza erişmek için E-posta girin.";
            mainBtn.innerText = "Giriş Yap";
            mainBtn.setAttribute("onclick", "login()");
            toggleBtn.innerText = "Hesabın Yok mu? Kayıt Ol";
        } else {
            title.innerText = "Yeni Hesap Oluştur";
            desc.innerText = "E-posta ve şifre belirleyerek kayıt olun.";
            mainBtn.innerText = "Kayıt Ol ve Başla";
            mainBtn.setAttribute("onclick", "register()");
            toggleBtn.innerText = "Zaten Hesabım Var? Giriş Yap";
        }
    }

    function register() {
        const email = document.getElementById('email').value.trim().toLowerCase();
        const pass = document.getElementById('password').value.trim();

        if(!email.includes("@") || !pass) {
            showError("Geçerli bir e-posta ve şifre girin!");
            return;
        }

        const docName = email.replace(/\./g, "_");
        db.collection("sistem_kullanicilari").doc(docName).get().then((doc) => {
            if (doc.exists) {
                showError("Bu e-posta adresi zaten kayıtlı!");
            } else {
                db.collection("sistem_kullanicilari").doc(docName).set({
                    realEmail: email,
                    password: btoa(pass)
                }).then(() => {
                    alert("Hesap başarıyla açıldı! Giriş yapabilirsiniz.");
                    toggleAuthMode();
                });
            }
        });
    }

    function login() {
        const email = document.getElementById('email').value.trim().toLowerCase();
        const pass = document.getElementById('password').value.trim();
        const docName = email.replace(/\./g, "_");

        if(!email || !pass) {
            showError("Lütfen tüm alanları doldurun!");
            return;
        }

        db.collection("sistem_kullanicilari").doc(docName).get().then((doc) => {
            if (doc.exists && atob(doc.data().password) === pass) {
                aktifKullaniciDoc = docName;
                document.getElementById('display-user').innerText = email;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                verileriBuluttanYukle(true); // Girişte bildirim kontrolü tetiklensin
            } else {
                showError("Hatalı e-posta veya şifre!");
            }
        }).catch(() => showError("Bağlantı hatası!"));
    }

    function forgotPassword() {
        const email = document.getElementById('email').value.trim().toLowerCase();
        if(!email) {
            alert("Lütfen önce e-posta alanını doldurun, ardından bu butona basın.");
            return;
        }
        const docName = email.replace(/\./g, "_");
        db.collection("sistem_kullanicilari").doc(docName).get().then((doc) => {
            if(doc.exists) {
                alert("Şifreniz: " + atob(doc.data().password));
            } else {
                alert("Bu e-posta adresine ait bir hesap bulunamadı!");
            }
        });
    }

    function showError(msg) {
        const errorText = document.getElementById('login-error');
        errorText.innerText = msg;
        errorText.style.display = 'block';
    }

    function logout() { location.reload(); }

    function getDonemKey() {
        const y = document.getElementById('select-year').value;
        const m = document.getElementById('select-month').value;
        return `${y}_${m}`;
    }

    function verileriBulutaKaydet() {
        if(!aktifKullaniciDoc) return;
        const donem = getDonemKey();

        const giderler = [];
        document.querySelectorAll('#giderTablosu .grid-cell-row').forEach(row => {
            const ad = row.querySelector('.gider-ad').value;
            const tutar = row.querySelector('.gider-tutar').value;
            const gun = row.querySelector('.gider-gun').value;
            const odendi = row.querySelector('.gider-odendi').checked;
            
            // Sadece tamamen boş olmayan satırları kaydet
            if(ad || tutar || gun) {
                giderler.push({ ad, tutar, gun, odendi });
            }
        });

        const gelirler = [];
        document.querySelectorAll('#gelirTablosu .grid-cell-row').forEach(row => {
            const ad = row.querySelector('.gelir-ad').value;
            const tutar = row.querySelector('.gelir-tutar').value;
            if(ad || tutar) {
                gelirler.push({ ad, tutar });
            }
        });

        db.collection("kullanici_verileri").doc(aktifKullaniciDoc).collection("donemler").doc(donem).set({
            giderler: giderler,
            gelirler: gelirler
        }).then(() => {
            hesapla();
            giderleriSirala(); // Her kayıttan sonra otomatik gün sırasına diz
        });
    }

    function verileriBuluttanYukle(bildirimKontrol = false) {
        const donem = getDonemKey();
        db.collection("kullanici_verileri").doc(aktifKullaniciDoc).collection("donemler").doc(donem).get().then((doc) => {
            document.querySelectorAll('.grid-cell-row').forEach(e => e.remove());

            if (doc.exists) {
                const data = doc.data();
                
                // GİDERLERİ YÜKLERKEN ÖNCE GÜNE GÖRE SIRALA (YAKINDAN UZAĞA)
                if(data.giderler && data.giderler.length > 0) {
                    let siraliGiderler = [...data.giderler].sort((a, b) => {
                        let gunA = parseInt(a.gun) || 999;
                        let gunB = parseInt(b.gun) || 999;
                        return gunA - gunB;
                    });

                    siraliGiderler.forEach(g => giderSatiriEkle(g.ad, g.tutar, g.gun, g.odendi, false));
                    
                    // BİLDİRİM MOTORU: Günü geçmiş ve ödenmemişleri bul
                    if(bildirimKontrol) {
                        tarihVeBildirimKontrol(data.giderler);
                    }
                } else { giderSatiriEkle(); }
                
                if(data.gelirler && data.gelirler.length > 0) {
                    data.gelirler.forEach(g => gelirSatiriEkle(g.ad, g.tutar, false));
                } else { gelirSatiriEkle(); }
            } else {
                giderSatiriEkle();
                gelirSatiriEkle();
            }
            hesapla();
        });
    }

    // BİLDİRİM KONTROL FONKSİYONU
    function tarihVeBildirimKontrol(giderListesi) {
        const bugun = new Date();
        const aktifYil = parseInt(document.getElementById('select-year').value);
        const aktifAy = parseInt(document.getElementById('select-month').value);

        // Eğer bakılan dönem şu anki gerçek takvim ayıyla eşleşiyorsa kontrol et
        if(bugun.getFullYear() === aktifYil && bugun.getMonth() === aktifAy) {
            const guncelGun = bugun.getDate();
            let gecikenler = [];

            giderListesi.forEach(g => {
                let gGun = parseInt(g.gun);
                if(gGun && gGun < guncelGun && !g.odendi && g.ad) {
                    gecikenler.push(g.ad);
                }
            });

            if(gecikenler.length > 0) {
                setTimeout(() => {
                    alert(`🚨 Ödeme Günü Geçmiş Giderleriniz Var!\n\nLütfen şu harcamaları kontrol edin:\n👉 ${gecikenler.join(", ")}`);
                }, 600);
            }
        }
    }

    // ANLIK SIRALAMA MOTORU (Dinamik Arayüz Sıralaması)
    function giderleriSirala() {
        const tablo = document.getElementById('giderTablosu');
        const satirlar = Array.from(tablo.querySelectorAll('.grid-cell-row'));
        
        satirlar.sort((a, b) => {
            let gunA = parseInt(a.querySelector('.gider-gun').value) || 999;
            let gunB = parseInt(b.querySelector('.gider-gun').value) || 999;
            return gunA - gunB;
        });

        // Mevcut DOM elemanlarını sıralı düzende tabloya yeniden ekle
        satirlar.forEach(satir => tablo.appendChild(satir));
    }

    function giderSatiriEkle(ad='', tutar='', gun='', odendi=false, tetikleme=false) {
        const tablo = document.getElementById('giderTablosu');
        const rowId = 'gider_' + Date.now() + Math.floor(Math.random() * 100);
        
        const html = `
            <div class="grid-cell-row" id="${rowId}" style="display: contents;">
                <div class="grid-cell"><input type="text" value="${ad}" class="gider-ad" placeholder="Örn: Kira" onchange="taksitKontrol('${rowId}')"></div>
                <div class="grid-cell"><input type="number" value="${tutar}" class="gider-tutar" placeholder="0" onchange="taksitKontrol('${rowId}')"></div>
                <div class="grid-cell"><input type="number" value="${gun}" class="gider-gun" placeholder="Gün (1-31)" min="1" max="31" onchange="taksitKontrol('${rowId}')"></div>
                <div class="grid-cell"><input type="checkbox" ${odendi ? 'checked' : ''} class="gider-odendi" onchange="verileriBulutaKaydet()"></div>
                <div class="grid-cell"><button class="delete-btn" onclick="giderSatirSilKontrol('${rowId}')">❌</button></div>
            </div>`;
        tablo.insertAdjacentHTML('beforeend', html);
        if(tetikleme) verileriBulutaKaydet();
    }

    function gelirSatiriEkle(ad='', tutar='', tetikleme=false) {
        const tablo = document.getElementById('gelirTablosu');
        const rowId = 'gelir_' + Date.now();
        const html = `
            <div class="grid-cell-row" id="${rowId}" style="display: contents;">
                <div class="grid-cell"><input type="text" value="${ad}" class="gelir-ad" placeholder="Örn: Maaş" onchange="verileriBulutaKaydet()"></div>
                <div class="grid-cell"><input type="number" value="${tutar}" class="gelir-tutar" placeholder="0" onchange="verileriBulutaKaydet()"></div>
                <div class="grid-cell"><button class="delete-btn" onclick="gelirSatirSil('${rowId}')">❌</button></div>
            </div>`;
        tablo.insertAdjacentHTML('beforeend', html);
        if(tetikleme) verileriBulutaKaydet();
    }

    function gelirSatirSil(id) {
        document.getElementById(id).remove();
        verileriBulutaKaydet();
    }

    function giderSatirSilKontrol(rowId) {
        const row = document.getElementById(rowId);
        if(!row) return;

        const ad = row.querySelector('.gider-ad').value.trim();

        if(ad.includes("(") && ad.includes("/")) {
            const hamAd = ad.split("(")[0].trim();
            const secim = confirm(`"${ad}" bir taksitli işlemdir.\n\nTAMAM: Bu aydan itibaren gelecekteki TÜM "${hamAd}" taksitlerini sil.\nİPTAL: Sadece bu ayki taksiti sil.`);
            
            if(secim) {
                let sYil = parseInt(document.getElementById('select-year').value);
                let sAy = parseInt(document.getElementById('select-month').value);
                let temizlikSözleri = [];

                for(let i = 0; i < 60; i++) {
                    let mevcutAy = sAy + i;
                    let mevcutYil = sYil;
                    if(mevcutAy > 11) {
                        mevcutYil += Math.floor(mevcutAy / 12);
                        mevcutAy = mevcutAy % 12;
                    }
                    const donemKey = `${mevcutYil}_${mevcutAy}`;

                    let gorev = db.collection("kullanici_verileri").doc(aktifKullaniciDoc).collection("donemler").doc(donemKey).get().then((doc) => {
                        if(doc.exists) {
                            let dGiderler = doc.data().giderler || [];
                            let dGelirler = doc.data().gelirler || [];
                            let yeniGiderler = dGiderler.filter(g => !(g.ad.startsWith(hamAd) && g.ad.includes("(")));
                            return db.collection("kullanici_verileri").doc(aktifKullaniciDoc).collection("donemler").doc(donemKey).set({
                                giderler: yeniGiderler,
                                gelirler: dGelirler
                            });
                        }
                    });
                    temizlikSözleri.push(gorev);
                }

                Promise.all(temizlikSözleri).then(() => {
                    alert(`"${hamAd}" taksit serisi bu aydan itibaren tamamen silindi!`);
                    verileriBuluttanYukle();
                });
                return;
            }
        }
        row.remove();
        verileriBulutaKaydet();
    }

    function taksitKontrol(rowId) {
        const row = document.getElementById(rowId);
        if(!row) return;

        const ad = row.querySelector('.gider-ad').value.trim();
        const tutar = row.querySelector('.gider-tutar').value.trim();
        const gun = row.querySelector('.gider-gun').value.trim();

        if(!ad || !tutar || !gun) {
            verileriBulutaKaydet();
            return;
        }

        if(ad.includes("(") && ad.includes("/")) {
            verileriBulutaKaydet();
            return;
        }

        setTimeout(() => {
            const cevap = confirm(`"${ad}" harcamasını taksitlendirmek istiyor musunuz?`);
            if(cevap) {
                const taksitSayisi = parseInt(prompt("Kaç taksit yapılacak? (Örn: 6)"));
                if(taksitSayisi && taksitSayisi > 1) {
                    let sYil = parseInt(document.getElementById('select-year').value);
                    let sAy = parseInt(document.getElementById('select-month').value);
                    let bakiyeYazmaSozu = [];

                    for(let i = 0; i < taksitSayisi; i++) {
                        let mevcutAy = sAy + i;
                        let mevcutYil = sYil;
                        if(mevcutAy > 11) {
                            mevcutYil += Math.floor(mevcutAy / 12);
                            mevcutAy = mevcutAy % 12;
                        }

                        const donemKey = `${mevcutYil}_${mevcutAy}`;
                        const taksitAd = `${ad} (${i+1}/${taksitSayisi})`;

                        if(i === 0) {
                            row.querySelector('.gider-ad').value = taksitAd;
                        }

                        let gorev = db.collection("kullanici_verileri").doc(aktifKullaniciDoc).collection("donemler").doc(donemKey).get().then((doc) => {
                            let dynamicGiderler = [];
                            let dynamicGelirler = [];
                            if(doc.exists) {
                                dynamicGiderler = doc.data().giderler || [];
                                dynamicGelirler = doc.data().gelirler || [];
                            }
                            
                            if(i === 0) {
                                dynamicGiderler = dynamicGiderler.filter(g => g.ad !== ad);
                            }

                            if(!dynamicGiderler.some(g => g.ad === taksitAd)) {
                                dynamicGiderler.push({ ad: taksitAd, tutar: tutar, gun: gun, odendi: false });
                            }

                            return db.collection("kullanici_verileri").doc(aktifKullaniciDoc).collection("donemler").doc(donemKey).set({
                                giderler: dynamicGiderler,
                                gelirler: dynamicGelirler
                            });
                        });
                        bakiyeYazmaSozu.push(gorev);
                    }

                    Promise.all(bakiyeYazmaSozu).then(() => {
                        alert(`${taksitSayisi} aylık taksit başarıyla planlandı!`);
                        verileriBuluttanYukle();
                    });
                } else {
                    verileriBulutaKaydet();
                }
            } else {
                verileriBulutaKaydet();
            }
        }, 100);
    }

    function hesapla() {
        let tGider = 0, oGider = 0, tGelir = 0;
        
        document.querySelectorAll('#giderTablosu .grid-cell-row').forEach(row => {
            let v = parseFloat(row.querySelector('.gider-tutar').value) || 0;
            tGider += v;
            if(row.querySelector('.gider-odendi').checked) oGider += v;
        });

        document.querySelectorAll('#gelirTablosu .grid-cell-row').forEach(row => {
            tGelir += parseFloat(row.querySelector('.gelir-tutar').value) || 0;
        });

        document.getElementById('toplamGider').innerText = tGider.toLocaleString('tr-TR') + " TL";
        document.getElementById('odenenGider').innerText = oGider.toLocaleString('tr-TR') + " TL";
        document.getElementById('kalanGider').innerText = (tGider - oGider).toLocaleString('tr-TR') + " TL";
        document.getElementById('toplamGelir').innerText = tGelir.toLocaleString('tr-TR') + " TL";
    }
</script>
</body>
</html>
