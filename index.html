<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bütçe Pro - Güvenli Takip</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #f4f6f9; padding: 10px; color: #333; }
        
        /* Giriş Paneli */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #2c3e50; display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-card {
            background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .login-card input {
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px;
        }
        
        /* Ana İçerik */
        #app-content { display: none; max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* Excel Stili Grid */
        .grid-table { display: grid; grid-template-columns: 2fr 1fr 1.5fr 0.8fr; gap: 1px; background: #e0e0e0; margin-bottom: 15px; border: 1px solid #e0e0e0; }
        .grid-header { background: #34495e; color: white; padding: 12px 8px; font-weight: bold; text-align: center; font-size: 14px; }
        .grid-cell { background: white; padding: 6px; display: flex; align-items: center; justify-content: center; }
        
        input[type="text"], input[type="number"], input[type="date"] { width: 100%; border: 1px solid #eee; padding: 8px; border-radius: 4px; outline: none; }
        input:focus { border-color: #3498db; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        
        .btn { background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 20px; font-size: 16px; font-weight: bold; }
        .btn:hover { background: #27ae60; }
        
        .summary-box { background: #ecf0f1; padding: 15px; border-radius: 8px; margin-bottom: 25px; }
        .summary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #bdc3c7; }
        .summary-row:last-child { border: none; }
    </style>
</head>
<body>

<!-- GİRİŞ VE KAYIT EKRANI -->
<div id="login-screen">
    <div class="login-card">
        <h2 id="login-title">Bütçe Pro Giriş</h2>
        <p id="login-desc" style="font-size: 13px; color: #7f8c8d; margin-bottom: 10px;">Lütfen giriş yapın.</p>
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <input type="password" id="password" placeholder="Şifre">
        <button class="btn" id="login-btn" onclick="handleAuth()">Giriş Yap</button>
        <p id="login-error" style="color: #e74c3c; display: none; font-size: 14px; font-weight: bold; margin-top: 10px;"></p>
    </div>
</div>

<!-- ANA UYGULAMA -->
<div id="app-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>Giderler</h2>
        <button onclick="logout()" style="background: #e74c3c; border: none; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;">Güvenli Çıkış</button>
    </div>
    
    <div class="grid-table" id="giderTablosu">
        <div class="grid-header">Gider Açıklaması</div>
        <div class="grid-header">Tutar (TL)</div>
        <div class="grid-header">Son Ödeme</div>
        <div class="grid-header">Ödendi</div>
    </div>
    <button class="btn" onclick="giderSatiriEkle('', '', '', false, true)">+ Gider Ekle</button>

    <div class="summary-box">
        <div class="summary-row"><span>Toplam Gider:</span> <span id="toplamGider" style="color:#3498db; font-weight:bold;">0 TL</span></div>
        <div class="summary-row"><span>Ödenen Tutar:</span> <span id="odenenGider" style="color: #2ecc71; font-weight:bold;">0 TL</span></div>
        <div class="summary-row" style="font-weight: bold;"><span>Kalan Ödeme:</span> <span id="kalanGider" style="color: #e74c3c;">0 TL</span></div>
    </div>

    <h2>Gelirler</h2>
    <div class="grid-table" style="grid-template-columns: 3fr 1fr;" id="gelirTablosu">
        <div class="grid-header">Gelir Açıklaması</div>
        <div class="grid-header">Tutar (TL)</div>
    </div>
    <button class="btn" style="background: #3498db;" onclick="gelirSatiriEkle('', '', true)">+ Gelir Ekle</button>
    
    <div class="summary-box" style="background: #e8f8f5;">
        <div class="summary-row" style="font-weight: bold; border: none; color: #27ae60; font-size: 18px;">
            <span>Gelirler Toplamı:</span> <span id="toplamGelir">0 TL</span>
        </div>
    </div>
</div>

<script>
    // Sayfa yüklenince ilk çalışan ayar
    window.onload = function() {
        const tescilliKullanici = localStorage.getItem('butce_user');
        if (!tescilliKullanici) {
            // Eğer sistemde kayıtlı kimse yoksa ekranı KAYIT moduna alıyoruz
            document.getElementById('login-title').innerText = "İlk Kullanım Kaydı";
            document.getElementById('login-desc').innerText = "Uygulamayı ilk kez açtınız. Kendinize özel bir kullanıcı adı ve şifre belirleyin.";
            document.getElementById('login-btn').innerText = "Kaydet ve Hesap Aç";
        }
    };

    // GİRİŞ VE KAYIT KONTROLÜ
    function handleAuth() {
        const userInp = document.getElementById('username').value.trim();
        const passInp = document.getElementById('password').value.trim();
        const errorText = document.getElementById('login-error');

        if(!userInp || !passInp) {
            errorText.innerText = "Lütfen alanları boş bırakmayın!";
            errorText.style.display = 'block';
            return;
        }

        const tescilliKullanici = localStorage.getItem('butce_user');

        if (!tescilliKullanici) {
            // KAYIT OLMA AŞAMASI: Şifreyi basit bir yöntemle maskeleyip kaydediyoruz
            const b64Password = btoa(passInp); // Kod tabanında şifre görünmez
            localStorage.setItem('butce_user', userInp);
            localStorage.setItem('butce_pass', b64Password);
            
            alert("Hesabınız oluşturuldu! Şimdi giriş yapabilirsiniz.");
            location.reload();
        } else {
            // GİRİŞ YAPMA AŞAMASI
            const kayitliUser = localStorage.getItem('butce_user');
            const kayitliPass = atob(localStorage.getItem('butce_pass')); // Şifreyi çöz

            if(userInp === kayitliUser && passInp === kayitliPass) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                verileriYukle(); // Giriş başarılıysa verileri yükle
            } else {
                errorText.innerText = "Hatalı kullanıcı adı veya şifre!";
                errorText.style.display = 'block';
            }
        }
    }

    function logout() {
        location.reload();
    }

    // VERİ KAYDETME (Anlık tetiklenir)
    function verileriKaydet() {
        const giderler = [];
        document.querySelectorAll('#giderTablosu .grid-cell-row').forEach(row => {
            giderler.push({
                ad: row.querySelector('.gider-ad').value,
                tutar: row.querySelector('.gider-tutar').value,
                tarih: row.querySelector('.gider-tarih').value,
                odendi: row.querySelector('.gider-odendi').checked
            });
        });

        const gelirler = [];
        document.querySelectorAll('#gelirTablosu .grid-cell-row').forEach(row => {
            gelirler.push({
                ad: row.querySelector('.gelir-ad').value,
                tutar: row.querySelector('.gelir-tutar').value
            });
        });

        localStorage.setItem('butce_verileri', JSON.stringify({giderler, gelirler}));
        hesapla();
    }

    // VERİ YÜKLEME
    function verileriYukle() {
        const data = JSON.parse(localStorage.getItem('butce_verileri'));
        if(data) {
            if(data.giderler.length > 0) {
                data.giderler.forEach(g => giderSatiriEkle(g.ad, g.tutar, g.tarih, g.odendi, false));
            } else { giderSatiriEkle('', '', '', false, false); }
            
            if(data.gelirler.length > 0) {
                data.gelirler.forEach(g => gelirSatiriEkle(g.ad, g.tutar, false));
            } else { gelirSatiriEkle('', '', false); }
        } else {
            // Hiç veri yoksa ilk açılışta 1 adet boş satır getir
            giderSatiriEkle('', '', '', false, false);
            gelirSatiriEkle('', '', false);
        }
        hesapla();
    }

    // SATIR EKLEME
    function giderSatiriEkle(ad='', tutar='', tarih='', odendi=false, tetikleme=false) {
        const tablo = document.getElementById('giderTablosu');
        const html = `
            <div class="grid-cell-row" style="display: contents;">
                <div class="grid-cell"><input type="text" value="${ad}" class="gider-ad" placeholder="Örn: Kira" oninput="verileriKaydet()"></div>
                <div class="grid-cell"><input type="number" value="${tutar}" class="gider-tutar" placeholder="0" oninput="verileriKaydet()"></div>
                <div class="grid-cell"><input type="date" value="${tarih}" class="gider-tarih" oninput="verileriKaydet()"></div>
                <div class="grid-cell"><input type="checkbox" ${odendi ? 'checked' : ''} class="gider-odendi" onchange="verileriKaydet()"></div>
            </div>`;
        tablo.insertAdjacentHTML('beforeend', html);
        if(tetikleme) verileriKaydet();
    }

    function gelirSatiriEkle(ad='', tutar='', tetikleme=false) {
        const tablo = document.getElementById('gelirTablosu');
        const html = `
            <div class="grid-cell-row" style="display: contents;">
                <div class="grid-cell"><input type="text" value="${ad}" class="gelir-ad" placeholder="Örn: Maaş" oninput="verileriKaydet()"></div>
                <div class="grid-cell"><input type="number" value="${tutar}" class="gelir-tutar" placeholder="0" oninput="verileriKaydet()"></div>
            </div>`;
        tablo.insertAdjacentHTML('beforeend', html);
        if(tetikleme) verileriKaydet();
    }

    // MATEMATİKSEL HESAPLAMA
    function hesapla() {
        let tGider = 0, oGider = 0, tGelir = 0;
        
        document.querySelectorAll('#giderTablosu .grid-cell-row').forEach(row => {
            let v = parseFloat(row.querySelector('.gider-tutar').value) || 0;
            tGider += v;
            if(row.querySelector('.gider-odendi').checked) oGider += v;
        });

        document.querySelectorAll('#gelirTablosu .grid-cell-row').forEach(row => {
            tGelir += parseFloat(row.querySelector('.gelir-tutar').value) || 0;
        });

        document.getElementById('toplamGider').innerText = tGider.toLocaleString('tr-TR') + " TL";
        document.getElementById('odenenGider').innerText = oGider.toLocaleString('tr-TR') + " TL";
        document.getElementById('kalanGider').innerText = (tGider - oGider).toLocaleString('tr-TR') + " TL";
        document.getElementById('toplamGelir').innerText = tGelir.toLocaleString('tr-TR') + " TL";
    }
</script>
</body>
</html>
