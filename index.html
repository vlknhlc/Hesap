<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Bütçe Pro v3</title>
    <style>
        :root { --bg: #ffffff; --border: #dee2e6; --header-bg: #f8f9fa; --danger: #dc3545; --success: #28a745; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; font-size: 13px; }
        body { background: #e9ecef; color: #212529; padding: 5px; }

        /* Giriş Paneli */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-card { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 300px; text-align: center; }
        .login-card input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; }
        
        #app-content { display: none; max-width: 500px; margin: 0 auto; background: white; border: 1px solid var(--border); box-shadow: 0 0 10px rgba(0,0,0,0.1); }

        /* Üst Menü */
        .top-nav { background: #343a40; color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .selectors select { padding: 4px; border-radius: 3px; font-weight: bold; }

        /* Tablo Yapısı */
        .excel-table { width: 100%; display: grid; border-bottom: 1px solid var(--border); }
        .row { display: grid; border-bottom: 1px solid var(--border); align-items: center; }
        .row:last-child { border-bottom: none; }
        
        /* Gider Grid: Açıklama(1fr), Tutar(80px), Gün(40px), Ödendi(30px), Sil(30px) */
        .gider-row { grid-template-columns: 1fr 90px 45px 35px 30px; }
        .gelir-row { grid-template-columns: 1fr 100px 35px; }
        
        .cell { padding: 6px 4px; border-right: 1px solid var(--border); height: 100%; display: flex; align-items: center; }
        .cell:last-child { border-right: none; }
        .header-cell { background: var(--header-bg); font-weight: bold; text-align: center; justify-content: center; font-size: 11px; text-transform: uppercase; }

        input { width: 100%; border: none; background: transparent; padding: 2px; }
        input:focus { background: #fffde7; outline: none; }
        input[type="number"] { text-align: right; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }

        /* Başlıklar */
        .section-title { background: #ff0000; color: white; padding: 5px 10px; font-weight: bold; text-align: center; }
        .gelir-title { background: #28a745; }

        /* Özet Kutuları */
        .summary-panel { padding: 10px; background: #fff; }
        .box { padding: 10px; margin-bottom: 5px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .box-red { background: #ffcccc; color: #900; }
        .box-green { background: #ccffcc; color: #060; }
        .box-blue { background: #cce5ff; color: #004085; }

        .btn-add { width: 100%; padding: 10px; background: #f8f9fa; border: none; border-bottom: 1px solid var(--border); color: #007bff; font-weight: bold; cursor: pointer; }
        .btn-del { color: #ccc; border: none; background: none; font-size: 16px; width: 100%; cursor: pointer; }
        .btn-del:hover { color: red; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h3>BÜTÇE GİRİŞ</h3>
        <input type="text" id="email" placeholder="E-posta">
        <input type="password" id="password" placeholder="Şifre" onkeydown="if(event.key==='Enter') login()">
        <button onclick="login()" style="width:100%; padding:10px; margin-top:10px; background:#007bff; color:white; border:none; border-radius:4px;">GİRİŞ</button>
    </div>
</div>

<div id="app-content">
    <div class="top-nav">
        <div class="selectors">
            <select id="select-year" onchange="verileriYukle()"></select>
            <select id="select-month" onchange="verileriYukle()"></select>
        </div>
        <button onclick="location.reload()" style="background:none; border:none; color:white; font-size:11px;">Çıkış</button>
    </div>

    <div class="section-title">GİDERLER (NAKİT)</div>
    <div class="excel-table">
        <div class="row gider-row">
            <div class="cell header-cell">AÇIKLAMA</div>
            <div class="cell header-cell">TUTAR</div>
            <div class="cell header-cell">GÜN</div>
            <div class="cell header-cell">✅</div>
            <div class="cell header-cell"></div>
        </div>
        <div id="giderBody"></div>
    </div>
    <button class="btn-add" onclick="giderEkle('','','',false,true)">+ Yeni Gider Satırı</button>

    <div class="section-title gelir-title">GELİRLER</div>
    <div class="excel-table">
        <div class="row gelir-row">
            <div class="cell header-cell">GELİR KAYNAĞI</div>
            <div class="cell header-cell">TUTAR</div>
            <div class="cell header-cell"></div>
        </div>
        <div id="gelirBody"></div>
    </div>
    <button class="btn-add" onclick="gelirEkle('','',true)">+ Yeni Gelir Satırı</button>

    <div class="summary-panel">
        <div class="box box-blue"><span>TOPLAM GİDER:</span> <span id="toplamGider">0 TL</span></div>
        <div class="box box-green"><span>TOPLAM GELİR:</span> <span id="toplamGelir">0 TL</span></div>
        <div id="dengeBox" class="box"><span>DENGE (KALAN):</span> <span id="denge">0 TL</span></div>
        <div class="box box-red" style="font-size: 14px; border: 2px solid red;"><span>ÖDENECEK KALAN:</span> <span id="kalanOdeme">0 TL</span></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB2AtnX-D7Wv1_ONCc3nhOrQgAK4RWWPiE",
        authDomain: "butcetakip-1addc.firebaseapp.com",
        projectId: "butcetakip-1addc",
        storageBucket: "butcetakip-1addc.firebasestorage.app",
        messagingSenderId: "657917369506",
        appId: "1:657917369506:web:8b3e9224f5ccd817eccbfb"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let aktifUser = "";

    window.onload = function() {
        const ms = document.getElementById('select-month');
        const ys = document.getElementById('select-year');
        ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"].forEach((a,i)=>ms.add(new Option(a,i)));
        for(let y=2025;y<=2030;y++) ys.add(new Option(y,y));
        ms.value = new Date().getMonth(); ys.value = new Date().getFullYear();
    };

    function login() {
        const email = document.getElementById('email').value.trim().toLowerCase();
        const pass = document.getElementById('password').value;
        const docN = email.replace(/\./g, "_");
        db.collection("sistem_kullanicilari").doc(docN).get().then(doc => {
            if(doc.exists && atob(doc.data().password) === pass) {
                aktifUser = docN;
                document.getElementById('login-screen').style.display='none';
                document.getElementById('app-content').style.display='block';
                verileriYukle(true);
            } else { alert("Hatalı Giriş!"); }
        });
    }

    function verileriKaydet() {
        if(!aktifUser) return;
        const donem = document.getElementById('select-year').value + "_" + document.getElementById('select-month').value;
        const giderler = [];
        document.querySelectorAll('.gider-item').forEach(r => {
            const ad = r.querySelector('.in-ad').value;
            const tu = r.querySelector('.in-tu').value;
            const gu = r.querySelector('.in-gu').value;
            const od = r.querySelector('.in-od').checked;
            if(ad || tu) giderler.push({ad, tu, gu, od});
        });
        const gelirler = [];
        document.querySelectorAll('.gelir-item').forEach(r => {
            const ad = r.querySelector('.in-ad').value;
            const tu = r.querySelector('.in-tu').value;
            if(ad || tu) gelirler.push({ad, tu});
        });
        db.collection("kullanici_verileri").doc(aktifUser).collection("donemler").doc(donem).set({giderler, gelirler}).then(hesapla);
    }

    function verileriYukle(bildirim = false) {
        const donem = document.getElementById('select-year').value + "_" + document.getElementById('select-month').value;
        db.collection("kullanici_verileri").doc(aktifUser).collection("donemler").doc(donem).get().then(doc => {
            document.getElementById('giderBody').innerHTML = "";
            document.getElementById('gelirBody').innerHTML = "";
            if(doc.exists) {
                const d = doc.data();
                if(d.giderler) {
                    d.giderler.sort((a,b)=>(parseInt(a.gu)||99)-(parseInt(b.gu)||99)).forEach(g => giderEkle(g.ad, g.tu, g.gu, g.od));
                    if(bildirim) kontrolEt(d.giderler);
                }
                if(d.gelirler) d.gelirler.forEach(g => gelirEkle(g.ad, g.tu));
            }
            hesapla();
        });
    }

    function giderEkle(ad='', tu='', gu='', od=false, tetik=false) {
        const id = 'g'+Date.now()+Math.random();
        const html = `
            <div class="row gider-row gider-item" id="${id}">
                <div class="cell"><input type="text" class="in-ad" value="${ad}" placeholder="..." onchange="verileriKaydet()"></div>
                <div class="cell"><input type="number" class="in-tu" value="${tu}" placeholder="0" onchange="verileriKaydet()"></div>
                <div class="cell"><input type="number" class="in-gu" value="${gu}" placeholder="-" onchange="verileriKaydet()"></div>
                <div class="cell" style="justify-content:center"><input type="checkbox" class="in-od" ${od?'checked':''} onchange="verileriKaydet()"></div>
                <div class="cell"><button class="btn-del" onclick="sil('${id}')">×</button></div>
            </div>`;
        document.getElementById('giderBody').insertAdjacentHTML('beforeend', html);
        if(tetik) verileriKaydet();
    }

    function gelirEkle(ad='', tu='', tetik=false) {
        const id = 'gel'+Date.now();
        const html = `
            <div class="row gelir-row gelir-item" id="${id}">
                <div class="cell"><input type="text" class="in-ad" value="${ad}" placeholder="..." onchange="verileriKaydet()"></div>
                <div class="cell"><input type="number" class="in-tu" value="${tu}" placeholder="0" onchange="verileriKaydet()"></div>
                <div class="cell"><button class="btn-del" onclick="sil('${id}')">×</button></div>
            </div>`;
        document.getElementById('gelirBody').insertAdjacentHTML('beforeend', html);
        if(tetik) verileriKaydet();
    }

    function sil(id) { if(confirm("Silinsin mi?")) { document.getElementById(id).remove(); verileriKaydet(); } }

    function hesapla() {
        let tg=0, tod=0, tgel=0;
        document.querySelectorAll('.gider-item').forEach(r => {
            let v = parseFloat(r.querySelector('.in-tu').value)||0;
            tg += v; if(r.querySelector('.in-od').checked) tod += v;
        });
        document.querySelectorAll('.gelir-item').forEach(r => tgel += parseFloat(r.querySelector('.in-tu').value)||0);
        
        document.getElementById('toplamGider').innerText = tg.toLocaleString() + " TL";
        document.getElementById('toplamGelir').innerText = tgel.toLocaleString() + " TL";
        document.getElementById('kalanOdeme').innerText = (tg - tod).toLocaleString() + " TL";
        
        const denge = tgel - tg;
        const dBox = document.getElementById('dengeBox');
        document.getElementById('denge').innerText = denge.toLocaleString() + " TL";
        dBox.className = denge >= 0 ? "box box-green" : "box box-red";
    }

    function kontrolEt(liste) {
        const gun = new Date().getDate();
        const gecen = liste.filter(g => parseInt(g.gu) < gun && !g.od && g.ad).map(g => g.ad);
        if(gecen.length > 0) alert("⚠️ Ödemesi Gecikenler:\n" + gecen.join(", "));
    }
</script>
</body>
</html>
