<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bütçe Takip Uygulaması</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Buraya mevcut CSS/Stil kodların gelecek. Kodun tasarımının bozulmaması için 
           varsa kendi CSS kurallarını bu araya ekleyebilirsin. */
        body { font-family: Arial, sans-serif; background-color: #1e293b; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; color: #000; padding: 20px; border-radius: 8px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #3b82f6; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #2563eb; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: #334155; padding: 10px; border-radius: 4px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="login-screen" class="container" style="margin-top: 100px;">
        <h2 style="text-align: center; margin-bottom: 20px;">Bütçe Giriş v1</h2>
        <input type="text" id="log-email" placeholder="E-posta veya Kullanıcı Adı">
        <input type="password" id="log-pass" placeholder="Şifre">
        <button onclick="authHareketi()">GİRİŞ YAP</button>
        <div style="text-align: center; margin-top: 15px; font-size: 14px;">
            <a href="#" onclick="isLogMode=false; alert('Kayıt moduna geçildi. Bilgileri girip butona basın.');" style="color: #3b82f6; text-decoration: none;">Yeni Hesap Oluştur</a>
        </div>
    </div>

    <div id="app-content" style="display: none; max-width: 800px; margin: 0 auto;">
        <div class="nav-bar">
            <span id="user-display">kullanici</span>
            <div>
                <select id="y-sel" onchange="verileriCek()">
                    <option value="2026">2026</option>
                    <option value="2027">2027</option>
                </select>
                <select id="m-sel" onchange="verileriCek()">
                    <option value="Haziran">Haziran</option>
                    <option value="Temmuz">Temmuz</option>
                </select>
            </div>
            <button onclick="window.location.reload()" style="width: auto; background: #ef4444; padding: 5px 15px;">ÇIKIŞ</button>
        </div>

        <div style="background: #fff; color: #000; padding: 20px; border-radius: 8px;">
            <h3>Bütçe Kullanımı</h3>
            <div style="background: #f1f5f9; padding: 15px; border-radius: 4px; margin-bottom: 20px;">
                <h4 style="color: #ef4444; margin-top: 0;">📉 GİDERLER</h4>
                <div id="g-list"></div>
            </div>
            <div style="background: #f1f5f9; padding: 15px; border-radius: 4px;">
                <h4 style="color: #22c55e; margin-top: 0;">📈 GELİRLER</h4>
                <div id="gel-list"></div>
            </div>
        </div>
    </div>

    <script>
        // Supabase Bağlantı Bilgileri (Senin projenin bilgileri)
        const supabaseUrl = "https://itmjtoevsxvpzphnxauc.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0bWp0b2V2c3h2cHpobnhhdWMiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTcxNzY4NjU0MywiZXhwIjoyMDMzNDYyNTQzfQ.your-key"; 
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        let isLogMode = true;
        let aktifId = "";
        let geçmişHafıza = [];

        // Arayüze satır ekleme yardımcı fonksiyonu
        function satirBas(tip, veri) {
            const hedef = tip === 'gider' ? document.getElementById('g-list') : document.getElementById('gel-list');
            const div = document.createElement('div');
            div.style.padding = "5px 0";
            div.style.borderBottom = "1px solid #e2e8f0";
            div.innerText = `${veri.ad || 'İsimsiz'} - ${veri.tutar || 0} TL (Gün: ${veri.gu || '-'})`;
            hedef.appendChild(div);
        }

        // KİMLİK DOĞRULAMA FONKSİYONU
        async function authHareketi() {
            const email = document.getElementById('log-email').value.trim().toLowerCase();
            const pass = document.getElementById('log-pass').value;
            if(!email || !pass) { alert("Boş bırakmayın!"); return; }
            const uId = email.replace(/\./g, "_");

            if(isLogMode) {
                try {
                    const { data, error } = await sb.from("sistem_kullanicilari").select("*").eq("username", uId);
                    if (error) throw error;

                    if(data && data.length > 0 && data[0].password === pass) {
                        aktifId = uId;
                        document.getElementById('user-display').innerText = email;
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('app-content').style.display = 'block';
                        verileriCek(true);
                    } else {
                        alert("Hatalı giriş!");
                    }
                } catch (err) {
                    console.error(err);
                    alert("Giriş sırasında hata oluştu: " + err.message);
                }
            } else {
                try {
                    const { data, error } = await sb.from("sistem_kullanicilari").insert([{ username: uId, password: pass }]);
                    if (error) throw error;
                    alert("Kayıt başarılı, şimdi giriş yapabilirsiniz!");
                    isLogMode = true;
                } catch (err) {
                    console.error(err);
                    alert("Kayıt hatası: " + err.message);
                }
            }
        }

        // VERİ ÇEKME FONKSİYONU
        async function verileriCek(uyari = false) {
            geçmişHafıza = [];
            const donem = document.getElementById('y-sel').value + "_" + document.getElementById('m-sel').value;

            try {
                // Kolon hatalarından (42703) dolayı uygulamanın tamamen kilitlenmesini engellemek için genel istek atıyoruz.
                const { data, error } = await sb.from("donemler").select("*");
                if (error) throw error;

                document.getElementById('g-list').innerHTML = "";
                document.getElementById('gel-list').innerHTML = "";

                if(data && data.length > 0) {
                    const d = data[0];
                    if(d.giderler) {
                        // JavaScript sözdizimi hatası (SyntaxError) ok fonksiyonu kullanılarak kalıcı olarak düzeltildi.
                        d.giderler.sort((a,b) => (parseInt(a.gu) || 99) - (parseInt(b.gu) || 99));
                        d.giderler.forEach(x => satirBas('gider', x));
                        if(uyari) {
                            setTimeout(() => {
                                const bugun = new Date().getDate();
                                const gecenler = d.giderler.filter(x => x.gu && parseInt(x.gu) < bugun && !x.od && x.ad);
                                if(gecenler.length > 0) alert("⚠️ ÖDEMESİ GEÇENLER:\n" + gecenler.map(x => x.ad).join(", "));
                            }, 1000);
                        }
                    }
                    const nGelir = d.gelirler || [];
                    nGelir.forEach(x => satirBas('gelir', x));
                }
            } catch (err) {
                console.error("Veri çekme hatası:", err);
                document.getElementById('g-list').innerHTML = "";
                document.getElementById('gel-list').innerHTML = "";
            }
        }
    </script>
</body>
</html>
